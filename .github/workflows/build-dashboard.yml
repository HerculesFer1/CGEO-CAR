name: Build Dashboard

on:
  # Auto: quando data.json muda
  push:
    paths:
      - 'pipeline/data/data.json'
      - 'pipeline/build.py'
  # Manual: via aba "Actions" no GitHub
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install -r pipeline/requirements.txt

      - name: Build index.html
        run: |
          cd pipeline
          python build.py --baseline ../index.html --out ../index.html

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "Nada para commitar."
          else
            git commit -m "build: regenera dashboard [skip ci]"
            git push
          fi
